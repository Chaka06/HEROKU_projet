<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connexion — Portail Partenaire</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4);
      width: 100%;
      max-width: 400px;
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 32px 32px 24px;
      text-align: center;
      color: #fff;
    }
    .login-header .icon {
      width: 60px; height: 60px;
      background: rgba(67,97,238,.2);
      border: 2px solid rgba(67,97,238,.4);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 14px;
      font-size: 26px;
      color: #4361ee;
    }
    .login-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-header p { font-size: 13px; color: rgba(255,255,255,.6); }
    .login-body { padding: 28px 32px 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: #aaa; font-size: 18px;
    }
    .form-control {
      width: 100%;
      padding: 11px 14px 11px 40px;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-control:focus {
      outline: none;
      border-color: #4361ee;
      box-shadow: 0 0 0 3px rgba(67,97,238,.12);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #4361ee;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #3a56d4; }
    .alert-danger {
      background: #ffe4e4;
      border-left: 3px solid #e63946;
      color: #7f1d1d;
      padding: 11px 14px;
      border-radius: 7px;
      font-size: 13px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .login-footer {
      text-align: center;
      padding: 14px;
      background: #f8f9fa;
      font-size: 11px;
      color: #999;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-header">
    <div class="icon"><i class='bx bx-shield-quarter'></i></div>
    <h1>Portail Partenaire</h1>
    <p>Accès réservé aux agents autorisés</p>
  </div>
  <div class="login-body">
    {% if error %}
    <div class="alert-danger">
      <i class='bx bx-error-circle'></i> {{ error }}
    </div>
    {% endif %}
    <form method="post" action="">
      {% csrf_token %}
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <div class="input-wrap">
          <i class='bx bx-user'></i>
          <input type="text" id="username" name="username" class="form-control"
                 placeholder="Votre identifiant" autocomplete="username" required/>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <i class='bx bx-lock-alt'></i>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required/>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class='bx bx-log-in'></i> Se connecter
      </button>
    </form>
  </div>
  <div class="login-footer">Accès sécurisé — Portail Partenaire</div>
</div>
</body>
</html>
